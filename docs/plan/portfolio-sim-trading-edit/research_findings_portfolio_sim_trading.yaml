      location: src/services/sim_trading_service.py
      relationship_to_domain: "核心修改目标：需要增加审批机制"
    - component: PortfolioService
      responsibility: "持仓 CRUD + 快照回放"
      location: src/services/portfolio_service.py
      relationship_to_domain: "核心修改目标：需要增加 update_trade 方法"
    - component: PortfolioRepository
      responsibility: "数据访问层"
      location: src/repositories/portfolio_repo.py
      relationship_to_domain: "需要增加 update_trade_in_session 方法"
    - component: Portfolio API
      responsibility: "REST API 端点"
      location: api/v1/endpoints/portfolio.py
      relationship_to_domain: "需要增加 PUT /trades/{trade_id} 端点"
    - component: PortfolioPage
      responsibility: "前端持仓页面"
      location: apps/dsa-web/src/pages/PortfolioPage.tsx
      relationship_to_domain: "需要增加交易编辑 UI 和审批 UI"

  data_flow_involving_domain: |
    创建交易：Frontend → POST /trades → PortfolioService.record_trade() → PortfolioRepository.add_trade_in_session() → DB
    删除交易：Frontend → DELETE /trades/{id} → PortfolioService.delete_trade_event() → PortfolioRepository.delete_trade_in_session() → DB
    模拟交易：main.py schedule → SimTradingService.run() → LLM → validate_and_execute() → PortfolioService.record_trade() → DB
    快照查询：Frontend → GET /snapshot → PortfolioService.get_portfolio_snapshot() → replay all events → DB

  key_relationships_to_domain:
    - from: SimTradingService
      to: PortfolioService
      relationship: "calls record_trade() 和 get_portfolio_snapshot()"
    - from: PortfolioService
      to: PortfolioRepository
      relationship: "委托 DB 操作"
    - from: "api/v1/endpoints/portfolio.py"
      to: PortfolioService
      relationship: "API 层调用 service 层"
    - from: "apps/dsa-web/src/api/portfolio.ts"
      to: "api/v1/endpoints/portfolio.py"
      relationship: "前端 axios HTTP 调用"

