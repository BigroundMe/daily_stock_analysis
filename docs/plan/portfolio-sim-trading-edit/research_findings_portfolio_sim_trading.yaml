patterns_found:
  - category: architecture
    pattern: "Event Sourcing with Snapshot Replay"
    description: "持仓系统采用事件溯源模式：所有交易/现金/企业行动作为事件存储，通过 replay 计算当前持仓快照"
    examples:
      - file: src/services/portfolio_service.py
        location: "get_portfolio_snapshot()"
        snippet: "回放全部事件（trades + cash_ledger + corporate_actions）生成持仓快照"
    prevalence: common

  - category: architecture
    pattern: "Write Serialization via SQLite BEGIN IMMEDIATE"
    description: "所有持仓写操作通过 portfolio_write_session() 上下文管理器使用 BEGIN IMMEDIATE 保证串行化"
    examples:
      - file: src/repositories/portfolio_repo.py
        location: "portfolio_write_session()"
        snippet: "session.connection().exec_driver_sql('BEGIN IMMEDIATE')"
    prevalence: common

  - category: architecture
    pattern: "Cache Invalidation on Write"
    description: "每次写入事件后调用 _invalidate_account_cache_in_session() 清除快照缓存"
    examples:
      - file: src/repositories/portfolio_repo.py
        location: "add_trade_in_session()"
        snippet: "self._invalidate_account_cache_in_session(session=session, account_id=account_id, from_date=trade_date)"
    prevalence: common

  - category: architecture
    pattern: "Sim Trading as Post-Analysis Hook"
    description: "模拟交易不在 pipeline 中，而是在 main.py schedule 模式分析完成后作为 hook 执行"
    examples:
      - file: main.py
        location: "main.py:595"
        snippet: "if getattr(config, 'sim_trading_enabled', False): ... sim_service.run(results, is_scheduled=True)"
    prevalence: rare

  - category: error_handling
    pattern: "Conflict Detection with Custom Exceptions"
    description: "交易写入冲突通过自定义异常处理：DuplicateTradeUidError, PortfolioOversellError, PortfolioBusyError"
    examples:
      - file: api/v1/endpoints/portfolio.py
        location: "create_trade()"
        snippet: "except PortfolioOversellError as exc: raise _conflict_error(error='portfolio_oversell', message=str(exc))"
    prevalence: common

  - category: naming
    pattern: "snake_case API → camelCase Frontend"
    description: "后端使用 snake_case，前端通过 toCamelCase() 工具函数自动转换"
    examples:
      - file: apps/dsa-web/src/api/portfolio.ts
        location: "portfolioApi.getSnapshot()"
        snippet: "return toCamelCase<PortfolioSnapshotResponse>(response.data)"
    prevalence: common

