plan_id: portfolio-sim-trading-edit
objective: "研究持仓/交易流水编辑和模拟交易手动审批开关的现有架构"
focus_area: "portfolio management + sim trading"
created_at: "2026-04-24"
created_by: researcher
status: completed

tldr: |
  - 持仓系统已有完整的 CRUD（增删查）+ 快照回放，但**交易流水只有 Create/Delete，没有 Update/Edit API**
  - 模拟交易是自动执行模式（schedule 触发 → LLM 决策 → 立即写入持仓），**没有任何审批/确认机制**
  - 前端 PortfolioPage 已有交易流水的列表展示和删除功能，但**没有编辑/修改 UI**
  - ORM 模型 PortfolioTrade 设计合理（id/account_id/symbol/side/quantity/price/fee/tax/note），可以直接支持 UPDATE
  - 实现两个功能需要：后端增加 trade UPDATE API + 前端编辑表单 + 新增 pending trade 状态/表 + 审批 API + 审批 UI

research_metadata:
  methodology: "hybrid retrieval: semantic_search + grep_search, file_search, read_file"
  scope: "全栈研究：ORM → Repository → Service → API → Frontend（TS types + API client + Page component）+ 模拟交易服务 + 配置"
  confidence: high
  coverage: 95
  decision_blockers: 3
  research_blockers: 0

