open_questions:
  - question: "交易流水编辑时，如果修改了历史交易的数量/价格，是否需要重新校验后续所有交易的 oversell 约束？"
    context: "当前 record_trade 在写入前校验 sell quantity <= available position；如果修改了历史 buy 数量，后续 sell 可能变成 oversell"
    type: decision_blocker
    affects: ["trade-edit-api", "trade-edit-validation"]

  - question: "模拟交易审批开关的 scope：是仅影响 schedule 自动触发的模拟交易，还是也影响通过 API 手动触发的？"
    context: "当前模拟交易仅在 main.py --schedule 模式触发；但未来可能会有 API 触发"
    type: decision_blocker
    affects: ["sim-trading-approval-scope"]

  - question: "审批后的交易执行时机：是在审批时使用 LLM 当时给出的价格，还是使用审批时的实时价格？"
    context: "LLM 给出的 price 是分析时的价格参考；如果隔天审批，价格可能已变"
    type: decision_blocker
    affects: ["sim-trading-approval-execution"]

  - question: "pending trade 数据需要持久化到 DB 还是使用内存/缓存？"
    context: "如果服务重启，内存中的 pending trade 会丢失；但如果用 DB，需要新增表"
    type: research
    affects: ["sim-trading-approval-storage"]

