plan_id: avg_cost_investigation
objective: 调查模拟仓持仓均价 0.932 与交易价格 0.927 不一致的根因
focus_area: avg_cost_fee_calculation
created_at: "2026-04-27"
created_by: researcher
status: completed

tldr: |
  - 持仓均价计算公式为 avg_cost = (gross + fee + tax) / quantity，其中 fee/tax 被计入成本
  - 模拟交易服务 SimTradingService 在执行交易时使用 config.sim_trading_default_commission 作为 fee，默认值为 5.0 元
  - 买入 1000 股 × 0.927 = 927.0 元，加上 fee=5.0 元，total_cost=932.0 元，avg_cost=932.0/1000=0.932，完全吻合
  - 根因：佣金（commission=5.0）被计入持仓成本，这是设计行为，非 bug
  - 差值 0.005 = 5.0 / 1000 = commission / quantity

