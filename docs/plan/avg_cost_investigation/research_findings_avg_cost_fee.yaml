patterns_found:
  - category: architecture
    pattern: "fee/tax 计入持仓成本"
    description: |
      无论 FIFO 还是 AVG 模式，买入时 total_cost 都包含 fee+tax：
      - FIFO: unit_cost = (gross + fee + tax) / qty
      - AVG:  state.total_cost += (gross + fee + tax)
      这意味着 avg_cost 不是纯买入均价，而是含费均价（全成本均价）。
    examples:
      - file: src/services/portfolio_service.py
        location: "line 1144"
        snippet: "unit_cost = (gross + fee + tax) / qty"
      - file: src/services/portfolio_service.py
        location: "line 1158"
        snippet: "state.total_cost += (gross + fee + tax)"
    prevalence: common

  - category: architecture
    pattern: "模拟交易固定佣金"
    description: |
      SimTradingService 使用 config.sim_trading_default_commission（默认 5.0 元）
      作为每笔交易的 fee，tax 固定为 0.0。
      该佣金为固定金额（非按比例），不随交易金额或数量变化。
    examples:
      - file: src/services/sim_trading_service.py
        location: "line 682"
        snippet: "commission = self.config.sim_trading_default_commission"
      - file: src/services/sim_trading_service.py
        location: "line 690"
        snippet: "fee=commission,"
    prevalence: common

  - category: architecture
    pattern: "手动录入 vs 模拟交易的 fee 差异"
    description: |
      - 通过 API 手动录入交易：fee 默认 0.0（用户可自定义传入）
      - 通过模拟交易执行：fee 固定为 sim_trading_default_commission（默认 5.0）
      这两种路径导致同一个 record_trade 方法在不同入口有不同的 fee 值。
    examples:
      - file: api/v1/schemas/portfolio.py
        location: "line 52"
        snippet: "fee: float = Field(0.0, ge=0)"
      - file: src/config.py
        location: "line 657"
        snippet: "sim_trading_default_commission: float = 5.0"
    prevalence: common

related_architecture:
  components_relevant_to_domain:
    - component: SimTradingService
      responsibility: LLM 决策 → 执行模拟交易
      location: src/services/sim_trading_service.py
      relationship_to_domain: "调用 portfolio_service.record_trade 并传入 fee=commission"
    - component: PortfolioService._replay_account
      responsibility: 重放所有事件计算持仓快照
      location: src/services/portfolio_service.py:1088
      relationship_to_domain: "核心计算逻辑：将 fee+tax 计入 total_cost"
    - component: PortfolioService._build_positions
      responsibility: 从 avg_state/fifo_lots 构建持仓行
      location: src/services/portfolio_service.py:1310
      relationship_to_domain: "计算 avg_cost = total_cost / qty"
    - component: Config.sim_trading_default_commission
      responsibility: 提供默认佣金值
      location: src/config.py:657
      relationship_to_domain: "决定 fee 的数值"

  data_flow_involving_domain: |
    SimTradingService.validate_and_execute()
      → commission = config.sim_trading_default_commission (5.0)
      → PortfolioService.record_trade(fee=5.0, tax=0.0)
        → repo.add_trade_in_session(fee=5.0, tax=0.0)  # 写入 DB
    PortfolioService.snapshot()
      → _replay_account()
        → 读取 trade.fee=5.0, trade.tax=0.0
        → gross = 1000 * 0.927 = 927.0
        → state.total_cost += (927.0 + 5.0 + 0.0) = 932.0
        → state.quantity += 1000
      → _build_positions()
        → avg_cost = 932.0 / 1000 = 0.932

