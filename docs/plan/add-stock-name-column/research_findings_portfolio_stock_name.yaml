plan_id: add-stock-name-column
objective: "在持仓明细表格中新增「股票名称」列"
focus_area: portfolio-positions-stock-name
created_at: "2026-04-27"
created_by: gem-researcher
status: completed

tldr: |
  - 前端持仓表格在 PortfolioPage.tsx L1030-L1038 定义 9 列（账户/代码/数量/均价/现价/市值/盈亏/评分/建议），无名称列
  - 后端 PortfolioPositionItem schema 无 name 字段；AnalysisHistory ORM 有 name 列，且已在 enriched 流程中被查询
  - 最佳方案：在 get_enriched_snapshot 中从已查到的 AnalysisHistory.name 顺带提取 stock_name，零额外查询
  - 改动面：后端 schema 2 处 + service 1 处 + 前端 type 1 处 + 页面组件 1 处，约 20 行变更

